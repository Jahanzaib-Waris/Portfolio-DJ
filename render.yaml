services:
  - type: web
    name: portfolio-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_DB_HOST
        sync: false
      - key: SUPABASE_DB_PORT
        value: "5432"
      - key: SUPABASE_DB_NAME
        value: postgres
      - key: SUPABASE_DB_USER
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: SUPABASE_STORAGE_BUCKET_NAME
        sync: false
      - key: SUPABASE_STORAGE_ENDPOINT_URL
        sync: false
      - key: SUPABASE_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: SUPABASE_STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: SUPABASE_STORAGE_REGION
        value: us-east-1
